<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🚨 Attack Blocked — SecureShield</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #da3633;
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 560px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 60px #da363320;
    }
    .shield { font-size: 5rem; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; font-weight: 800; color: #ff7b72; margin-bottom: 10px; }
    .subtitle { color: #8b949e; margin-bottom: 30px; font-size: 0.95rem; }
    .attack-badge {
      display: inline-block;
      background: #2d1015;
      border: 1px solid #da3633;
      color: #ff7b72;
      padding: 8px 20px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 24px;
    }
    .url-box {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.8rem;
      color: #8b949e;
      word-break: break-all;
      text-align: left;
      margin-bottom: 30px;
    }
    .url-box span { color: #484f58; font-size: 0.75rem; display: block; margin-bottom: 4px; }
    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      background: #21262d;
      color: #e6edf3;
      transition: background 0.2s;
    }
    .btn:hover { background: #30363d; }
    .footer-note {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="shield">🛡️</div>
    <h1>Attack Blocked</h1>
    <p class="subtitle">SecureShield intercepted a malicious request before it could cause harm.</p>

    <div class="attack-badge">🚨 {{ attack }}</div>

    <div class="url-box">
      <span>Blocked URL:</span>
      {{ url }}
    </div>

    <a href="/" class="btn">← Back to Home</a>
    &nbsp;
    <a href="/report" class="btn">📊 View Report</a>

    <p class="footer-note">This request has been logged automatically by SecureShield.</p>
  </div>
</body>
</html>
